<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>Switch control / Progressive Enhancement / FDND</title>
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
		<link href="assets/styles.css" rel="stylesheet">
		<style>
			/* Schrijf hier gewoon je CSS voor dit component */

			/* Gebruik enhanced CSS als het pseudo-element '::after' wordt ondersteund */
			@supports selector(::after) {

				input[type="checkbox"] {
					/* Om de styling volledig aan te passen */
					appearance:none;
					
					/* Styling van achtergrond balk */
					background-color:grey;
					border-radius:1.8em;
					width:7em;
					padding: 0.3em;

					cursor:pointer;
					font-weight: 700;

					/* Achtergrond balk veranderd van kleur bij het aanzetten */
					&:checked {
						background-color:var(--green);
					}

					&::after {
						content:"aan";
						display:flex;
						justify-content: center;
						align-items: center;

						/* Styling van het bolletje */
						width:3em;
						aspect-ratio:1;
						background-color:white;
						border-radius:inherit;
						
						/* Om de content tekst onzichtbaar te maken */
						color: transparent;

						transition:.3s;
					}

					&:checked::after {
						/* Om het bolletje te bewegen */
						translate:3.4em;

						/* Om de content tekst zichtbaar te maken */
						color: black;
					}
				}
			}
		</style>
	</head>
	<body>
		<h1>Switch control</h1>
		
		<!-- Hint: Safari heeft hiervoor iets bedacht, maar is dat al een standaard?
		     Wat gebeurt er in browsers die dat nog niet ondersteunen? -->

			<label>
				<input type="checkbox" name="" id="">
			</label>

		<details open>
			<summary>Demo video</summary>
			<video src="assets/switch.mp4" width="119" height="67" controls muted>
				<a href="assets/switch.mp4">assets/switch.mp4</a>
			</video>
		</details>
	</body>
</html>
